spring:
  application:
    name: admin-dashboard-project
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce
    username: root
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  servlet:
    session:
      timeout: 24h
      cookie:
        http-only: true